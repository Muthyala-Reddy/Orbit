server:
  port: 8085

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  cloud:
    gateway:
      server:
        webflux:

          globalcors:
            add-to-simple-url-handler-mapping: true
            corsConfigurations:
              '[/**]':
                allowedOriginPatterns:
                  - "http://localhost:5173"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true

          # ===============================
          # ✅ ROUTES (EUREKA – lb://)
          # ===============================
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**

            - id: tour-service
              uri: lb://tour-service
              predicates:
                - Path=/api/tours/**

            - id: booking-service
              uri: lb://booking-service
              predicates:
                - Path=/api/bookings/**

            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/payments/**

            - id: rulebased-service
              uri: lb://rulebased
              predicates:
                - Path=/api/chat/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka