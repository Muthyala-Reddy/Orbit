
server:
  port: 8081

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:mysql://localhost:3307/tour_booking_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

app:
  jwt:
    secret: "THIS_IS_A_LONG_SECRET_KEY_FOR_JWT_1234567890_ABCDEFG"
    expiryMinutes: 60

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka